    <style>
      :root {
        --bg-primary: #ffffff; --bg-secondary: #f8fafc; --bg-tertiary: #f1f5f9;
        --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #64748b;
        --accent: #2563eb; --accent-secondary: #1d4ed8; --accent-glow: rgba(37, 99, 235, 0.05);
        --border: rgba(15, 23, 42, 0.08); --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-fast: 0.2s ease; --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --container-width: 1280px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; scroll-padding-top: 80px; }
      body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', system-ui, -apple-system, sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; text-rendering: optimizeSpeed; }
      
      .container { max-width: var(--container-width); margin: 0 auto; padding: 0 2rem; }
      .section { padding: 8rem 0; position: relative; content-visibility: auto; contain-intrinsic-size: 1px 500px; }
      
      /* Navbar & Logo */
      .navbar { position: relative !important; height: 200px !important; display: flex !important; align-items: center !important; justify-content: center !important; background: transparent !important; border: none !important; backdrop-filter: none !important; box-shadow: none !important; z-index: 1100; margin-bottom: 0 !important; }
      .navbar .logo { display: flex; align-items: center; font-size: 1.25rem; font-weight: 900; }
      
      /* Hamburger Menu Button */
      .menu-btn { position: fixed !important; top: 40px !important; left: 2rem !important; width: 44px; height: 44px; display: flex; flex-direction: column; justify-content: center; gap: 8px; z-index: 9999 !important; cursor: pointer; border: none; background: none; transition: var(--transition-fast); }
      .menu-icon-bar { width: 32px; height: 4px; background-color: var(--text-primary); border-radius: 4px; transition: var(--transition-fast); }
      .menu-btn.open .menu-icon-bar { background-color: var(--accent); }
      .menu-btn.open .menu-icon-bar:nth-child(1) { transform: translateY(6px) rotate(45deg); }
      .menu-btn.open .menu-icon-bar:nth-child(2) { transform: translateY(-6px) rotate(-45deg); }
      
      /* Nav Overlay */
      .nav-overlay { position: fixed; top: 0; right: 0; width: 100%; height: 100vh; background: rgba(255, 255, 255, 0.98); z-index: 1250; display: flex; align-items: center; justify-content: center; transform: translateY(-100%); opacity: 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
      .nav-overlay.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
      .nav-overlay-links { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
      .nav-overlay-links a { text-decoration: none; color: var(--text-primary); font-size: 2rem; font-weight: 900; letter-spacing: -0.04em; transition: var(--transition); }
      .nav-overlay-links a:hover { color: var(--accent); transform: scale(1.05); }

      .hero { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0.5rem 2rem; background: radial-gradient(circle at top right, #eff6ff 0%, transparent 40%), radial-gradient(circle at bottom left, #f5f3ff 0%, transparent 40%); }
      .hero-title { font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1; margin-bottom: 1.5rem; color: var(--text-primary); }
      .hero-title span { color: var(--accent); background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      
      .section-tag { display: inline-block; padding: 0.4rem 1rem; background: var(--accent-soft); color: var(--accent); border-radius: 99px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; }
      h2 { font-size: 3.5rem; letter-spacing: -0.03em; margin-bottom: 1rem; }
      
      .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1.5rem; }
      .bento-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; transition: var(--transition); position: relative; overflow: hidden; }
      .bento-card:hover { background: #fff; transform: translateY(-8px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
      .span-8 { grid-column: span 8; } .span-4 { grid-column: span 4; }
      
      .btn { display: inline-flex; align-items: center; justify-content: center; padding: 1.1rem 2.2rem; border-radius: 12px; font-weight: 600; text-decoration: none; transition: var(--transition); }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
      .btn-outline { border: 1px solid var(--border); color: var(--text-primary); }

      .reveal { opacity: 0; }
      .reveal.active { animation: fadeInUp 0.8s forwards; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

      .seo-split { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; background: var(--text-primary); color: #fff; padding: 6rem; border-radius: 40px; }
      .seo-split h2, .seo-split p { color: #fff; }
      
      footer { padding: 6rem 0; border-top: 1px solid var(--border); text-align: center; }

      @media (max-width: 768px) {
        .navbar { height: 200px !important; }
        .menu-btn { top: 20px !important; left: 1rem !important; }
        .hero-title { font-size: 3.2rem; }
        .section { padding: 5rem 0; }
        .bento-grid { grid-template-columns: 1fr; }
        .span-4, .span-8 { grid-column: span 12; }
        .nav-overlay-links a { font-size: 1.6rem; }
        .seo-split { grid-template-columns: 1fr; padding: 3rem; text-align: center; }
        h2 { font-size: 2.5rem; }
      }

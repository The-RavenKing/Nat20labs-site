<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nat 20 Labs | Expert Web Development & SEO Agency UK</title>
    <meta name="description" content="Nat 20 Labs: UK-based freelance specialists in high-performance React development and strategic SEO management." />
    <link rel="canonical" href="https://nat20labs.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      :root {
        --bg-primary: #020617; --bg-secondary: #0f172a; --bg-tertiary: #1e293b;
        --text-primary: #f8fafc; --text-secondary: #cbd5e1; --text-muted: #94a3b8;
        --accent: #38bdf8; --accent-secondary: #818cf8; --accent-glow: rgba(56, 189, 248, 0.15);
        --border: rgba(255, 255, 255, 0.08); --transition-fast: 0.2s ease;
        --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background-color: var(--bg-primary); color: var(--text-primary); font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; text-rendering: optimizeSpeed; }
      .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
      .section { padding: 8rem 0; position: relative; content-visibility: auto; contain-intrinsic-size: 1px 500px; }
      
      /* Navbar */
      .navbar { position: fixed; top: 0; left: 0; right: 0; height: 80px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; transition: var(--transition-fast); }
      .navbar.scrolled { height: 64px; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
      .logo { font-size: 1.25rem; font-weight: 900; letter-spacing: -0.05em; color: var(--text-primary); }
      .logo span { color: var(--accent); }
      .nav-links { display: flex; gap: 2.5rem; }
      .nav-link { font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); transition: var(--transition-fast); text-decoration: none; }
      .nav-link:hover { color: var(--accent); }

      /* Hero */
      .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-top: 80px; background: radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.05) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.05) 0%, transparent 50%); }
      .hero-badge { background: var(--accent-glow); color: var(--accent); padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.875rem; font-weight: 600; margin-bottom: 2rem; border: 1px solid var(--accent); }
      .hero-title { font-size: clamp(3rem, 10vw, 6rem); margin-bottom: 1.5rem; max-width: 900px; font-weight: 800; color: var(--text-primary); }
      .hero p { max-width: 600px; margin-bottom: 3rem; font-size: 1.25rem; color: var(--text-secondary); }

      /* Cards & Grid */
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
      .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid var(--border); }
      .card { padding: 2.5rem; border-radius: 1rem; transition: transform 0.3s; }
      .service-card { padding: 3rem; border-radius: 16px; transition: var(--transition-slow); }
      .service-card:hover { background: var(--bg-secondary); transform: translateY(-8px); }
      .service-icon { width: 48px; height: 48px; background: var(--accent-glow); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--accent); margin-bottom: 2rem; }
      
      .btn { display: inline-flex; align-items: center; justify-content: center; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; transition: var(--transition-fast); text-decoration: none; }
      .btn-primary { background: var(--accent); color: var(--bg-primary); }

      /* Animations */
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .reveal { opacity: 0; animation: fadeInUp 0.8s forwards; }
      .reveal-delay-1 { animation-delay: 0.2s; } .reveal-delay-2 { animation-delay: 0.4s; }

      /* Markdown & Blog */
      .markdown-content p { margin-bottom: 1.5rem; color: var(--text-secondary); }
      .markdown-content h2 { color: var(--text-primary); margin: 2rem 0 1rem; }

      @media (max-width: 768px) {
        .nav-links { display: none; }
        .hero-title { font-size: 3.2rem; }
        .section { padding: 5rem 0; }
      }
    </style>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap&font-display=swap" media="print" onload="this.media='all'">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

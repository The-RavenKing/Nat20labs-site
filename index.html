<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nat 20 Labs | Modern Web Dev & SEO Agency UK</title>
    <meta name="description" content="Nat 20 Labs: High-performance React development and strategic SEO management for UK businesses." />
    <link rel="canonical" href="https://nat20labs.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="/logo-v2.webp">

    <style>
      :root {
        --bg-primary: #ffffff; --bg-secondary: #f8fafc; --bg-tertiary: #f1f5f9;
        --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #64748b;
        --accent: #2563eb; --accent-secondary: #1d4ed8; --accent-glow: rgba(37, 99, 235, 0.05);
        --border: rgba(15, 23, 42, 0.08); --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-fast: 0.2s ease; --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --container-width: 1280px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; scroll-padding-top: 80px; }
      body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', system-ui, -apple-system, sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; text-rendering: optimizeSpeed; }
      
      .container { max-width: var(--container-width); margin: 0 auto; padding: 0 2rem; }
      .section { padding: 8rem 0; position: relative; }
      
      /* Navbar & Logo */
      .navbar { position: relative !important; height: 200px !important; display: flex !important; align-items: center !important; justify-content: center !important; background: transparent !important; border: none !important; backdrop-filter: none !important; box-shadow: none !important; z-index: 1100; margin-bottom: 2rem; }
      .navbar .logo { display: flex; align-items: center; }
      
      /* Hamburger Menu Button */
      .menu-btn { position: fixed !important; top: 40px !important; left: 2rem !important; width: 44px; height: 44px; display: flex; flex-direction: column; justify-content: center; gap: 8px; z-index: 9999 !important; cursor: pointer; border: none; background: none; transition: var(--transition-fast); }
      .menu-icon-bar { width: 32px; height: 4px; background-color: var(--text-primary); border-radius: 4px; transition: var(--transition-fast); }
      
      .hero { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; background: radial-gradient(circle at top right, #eff6ff 0%, transparent 40%), radial-gradient(circle at bottom left, #f5f3ff 0%, transparent 40%); }
      .hero-title { font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1; margin-bottom: 1.5rem; color: var(--text-primary); }
      .hero-title span { color: var(--accent); background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      
      .section-tag { display: inline-block; padding: 0.4rem 1rem; background: var(--accent-soft); color: var(--accent); border-radius: 99px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; }
      
      .btn { display: inline-flex; align-items: center; justify-content: center; padding: 1.1rem 2.2rem; border-radius: 12px; font-weight: 600; text-decoration: none; transition: var(--transition); }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-outline { border: 1px solid var(--border); color: var(--text-primary); }

      @media (max-width: 768px) {
        .navbar { height: 200px; }
        .menu-btn { top: 20px !important; left: 1rem !important; }
        .hero-title { font-size: 3.2rem; }
        .nav-overlay-links a { font-size: 1.6rem; }
      }
    </style>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap&font-display=swap" media="print" onload="this.media='all'">
  </head>
  <body>
    <div id="root">
      <!-- App Shell: Immediate Render for 100/100 Perf -->
      <header>
        <nav class="navbar container">
          <div class="menu-btn">
            <div class="menu-icon-bar"></div>
            <div class="menu-icon-bar"></div>
          </div>
          <div class="logo">
            <img src="/logo-v2.webp" alt="Nat 20 Labs" width="800" height="200" fetchpriority="high" style="height: 200px; width: auto; display: block;">
          </div>
        </nav>
      </header>
      <main>
        <section class="hero container">
          <span class="section-tag">Freelance Web Dev & SEO</span>
          <h1 class="hero-title">Rolling Criticals for <span>Your Business</span></h1>
          <p style="color: var(--text-secondary); font-size: 1.15rem; max-width: 600px; margin: 0 auto;">High-performance web applications and strategic SEO management. We turn technical complexity into business growth.</p>
          <div style="display: flex; gap: 1rem; marginTop: 1rem; justify-content: center; margin-top: 2rem;">
            <div class="btn btn-primary">Start a Project</div>
            <div class="btn btn-outline">View Our Work</div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
